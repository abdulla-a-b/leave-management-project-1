name: Daily HR & Leave Automation

on:
  schedule:
    - cron: '0 1 * * *'   # 07:00 BST every day
  workflow_dispatch:

permissions:
  contents: write

jobs:
  automation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r forecasting/requirements.txt

      - name: Run leave forecast
        env:
          LEAVE_ATLAS_API: ${{ secrets.LEAVE_ATLAS_API }}
        run: python forecasting/forecast.py --api-url "$LEAVE_ATLAS_API" --out-dir data

      - name: Run HR pulse (roster, docs, churn, allocations)
        env:
          LEAVE_ATLAS_API: ${{ secrets.LEAVE_ATLAS_API }}
        run: python forecasting/hr_pulse.py --api-url "$LEAVE_ATLAS_API" --out data

      - name: Commit results
        run: |
          git config user.name  "leave-atlas-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: daily HR pulse + leave forecast $(date -u +'%Y-%m-%d')"
          git push
